name: Build Mobile & Web App (Android, iOS & Web)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-android-icons:
    name: Generate Launcher Icons for StellariumCaller
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Generate Mipmap Icons
        run: |
          mkdir -p StellariumCaller/app/src/main/res/mipmap-mdpi
          mkdir -p StellariumCaller/app/src/main/res/mipmap-hdpi
          mkdir -p StellariumCaller/app/src/main/res/mipmap-xhdpi
          mkdir -p StellariumCaller/app/src/main/res/mipmap-xxhdpi
          mkdir -p StellariumCaller/app/src/main/res/mipmap-xxxhdpi

          # mdpi (48x48)
          convert assets/logo.png -resize 48x48 StellariumCaller/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert assets/logo.png -resize 48x48 StellariumCaller/app/src/main/res/mipmap-mdpi/ic_launcher_round.png

          # hdpi (72x72)
          convert assets/logo.png -resize 72x72 StellariumCaller/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert assets/logo.png -resize 72x72 StellariumCaller/app/src/main/res/mipmap-hdpi/ic_launcher_round.png

          # xhdpi (96x96)
          convert assets/logo.png -resize 96x96 StellariumCaller/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert assets/logo.png -resize 96x96 StellariumCaller/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png

          # xxhdpi (144x144)
          convert assets/logo.png -resize 144x144 StellariumCaller/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert assets/logo.png -resize 144x144 StellariumCaller/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png

          # xxxhdpi (192x192)
          convert assets/logo.png -resize 192x192 StellariumCaller/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert assets/logo.png -resize 192x192 StellariumCaller/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

  build-android-capacitor:
    name: Build Android (APK & AAB) - Capacitor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Bun (Fast JavaScript Runtime)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Compile Web App
        run: bun run build

      - name: Sync Capacitor Android
        run: bun run cap sync android

      - name: Ensure gradle-wrapper.jar is Valid
        run: |
          # Check if the jar is valid; if not, download a fresh copy
          if ! unzip -t android/gradle/wrapper/gradle-wrapper.jar &>/dev/null; then
            echo "gradle-wrapper.jar is corrupt, downloading fresh copy..."
            rm -f android/gradle/wrapper/gradle-wrapper.jar
            curl -fsSL "https://github.com/gradle/gradle/raw/v8.14.3/gradle/wrapper/gradle-wrapper.jar" \
              -o android/gradle/wrapper/gradle-wrapper.jar
            chmod 644 android/gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Grant Execute Permissions for Gradle
        run: chmod +x android/gradlew

      - name: Decode Keystore & Set Signing Env
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/android/app/keystore.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build Release APK & AAB
        run: |
          cd android
          ./gradlew assembleRelease bundleRelease

      - name: Upload Release APK/AAB Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-capacitor-artifacts
          path: |
            android/app/build/outputs/apk/release/app-release-unsigned.apk
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn

  build-android-stellariumcaller:
    name: Build StellariumCaller (Owner App)
    runs-on: ubuntu-latest
    needs: generate-android-icons
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Bun (Fast JavaScript Runtime)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Ensure gradle-wrapper.jar is Valid
        run: |
          if ! unzip -t StellariumCaller/gradle/wrapper/gradle-wrapper.jar &>/dev/null; then
            echo "gradle-wrapper.jar is corrupt, downloading fresh copy..."
            rm -f StellariumCaller/gradle/wrapper/gradle-wrapper.jar
            curl -fsSL "https://github.com/gradle/gradle/raw/v8.14.3/gradle/wrapper/gradle-wrapper.jar" \
              -o StellariumCaller/gradle/wrapper/gradle-wrapper.jar
            chmod 644 StellariumCaller/gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Grant Execute Permissions for Gradle
        run: chmod +x StellariumCaller/gradlew

      - name: Decode Keystore & Set Signing Env
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > StellariumCaller/app/keystore.jks
          echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/StellariumCaller/app/keystore.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build StellariumCaller Release APK & AAB
        run: |
          cd StellariumCaller
          ./gradlew assembleRelease bundleRelease

      - name: Upload StellariumCaller Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stellariumcaller-artifacts
          path: |
            StellariumCaller/app/build/outputs/apk/release/app-release.apk
            StellariumCaller/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn

  build-ios:
    name: Build iOS (Simulator Compilation)
    runs-on: macos-26
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Compile Web App
        run: bun run build

      - name: Sync Capacitor iOS
        run: bun run cap sync ios

      - name: Compile Xcode Project (Simulator Build - No Provisioning Profiles Required)
        run: |
          # First ensure the workspace exists, fall back to project if not
          if [ -f "ios/App/App.xcworkspace" ]; then
            WORKSPACE_FLAG="-workspace ios/App/App.xcworkspace"
          else
            WORKSPACE_FLAG="-project ios/App/App.xcodeproj"
          fi
          xcodebuild \
            $WORKSPACE_FLAG \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package Simulator App Bundle
        run: |
          mkdir -p ios-build
          cp -r build/Build/Products/Debug-iphonesimulator/App.app ios-build/Stellarium.app
          zip -r ios-build/Stellarium-iOS-Simulator.zip ios-build/Stellarium.app

      - name: Upload iOS Simulator Binary
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: ios-build/Stellarium-iOS-Simulator.zip
          if-no-files-found: error

  release:
    name: Create Continuous Release
    runs-on: ubuntu-latest
    needs: [build-android-capacitor, build-android-stellariumcaller, build-ios]
    if: github.event_name == 'push'
    steps:
      - name: Generate Date-Based Tag
        id: tag
        run: |
          echo "release_tag=release-$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename Artifacts for Release
        env:
          TAG: ${{ steps.tag.outputs.release_tag }}
        run: |
          mkdir -p release-files

          # Capacitor Android
          APK_FILE=$(find artifacts/android-capacitor-artifacts -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" "release-files/Stellarium-Foundation-Android-$TAG.apk"
          fi
          AAB_FILE=$(find artifacts/android-capacitor-artifacts -name "*.aab" -type f 2>/dev/null | head -1)
          if [ -n "$AAB_FILE" ]; then
            cp "$AAB_FILE" "release-files/Stellarium-Foundation-Android-$TAG.aab"
          fi

          # StellariumCaller (owner app)
          OWNER_APK=$(find artifacts/stellariumcaller-artifacts -name "app-release.apk" -type f 2>/dev/null | head -1)
          if [ -n "$OWNER_APK" ]; then
            cp "$OWNER_APK" "release-files/Stellarium-Caller-Owner-$TAG.apk"
          fi
          OWNER_AAB=$(find artifacts/stellariumcaller-artifacts -name "app-release.aab" -type f 2>/dev/null | head -1)
          if [ -n "$OWNER_AAB" ]; then
            cp "$OWNER_AAB" "release-files/Stellarium-Caller-Owner-$TAG.aab"
          fi

          # iOS
          IOS_ZIP=$(find artifacts/ios-simulator-build -name "*.zip" -type f 2>/dev/null | head -1)
          if [ -n "$IOS_ZIP" ]; then
            cp "$IOS_ZIP" "release-files/Stellarium-Foundation-iOS-Simulator-$TAG.zip"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Continuous Build ${{ steps.tag.outputs.release_tag }}
          body: |
            ## Continuous Build — ${{ steps.tag.outputs.release_tag }}

            **Commit:** ${{ github.sha }}

            ### Artifacts

            | Platform | File | Type |
            |---|---|---|
            | 📱 Android (Capacitor) | `Stellarium-Foundation-Android-${{ steps.tag.outputs.release_tag }}.apk` | Release APK |
            | 📱 Android (Capacitor) | `Stellarium-Foundation-Android-${{ steps.tag.outputs.release_tag }}.aab` | Android App Bundle |
            | 📱 Android (Owner) | `Stellarium-Caller-Owner-${{ steps.tag.outputs.release_tag }}.apk` | Release APK |
            | 📱 Android (Owner) | `Stellarium-Caller-Owner-${{ steps.tag.outputs.release_tag }}.aab` | Android App Bundle |
            | 🍏 iOS | `Stellarium-Foundation-iOS-Simulator-${{ steps.tag.outputs.release_tag }}.zip` | Simulator build |
          files: release-files/*